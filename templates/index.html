<!DOCTYPE html>
<html lang="en">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    h2 {
      color: #333;
    }

    form {
      margin-top: 20px;
    }

    input[type="text"],
    input[type="file"] {
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input[type="submit"] {
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
  <body>
    <h2>Enter a year</h2>

    <form method="POST" action="/run" enctype="multipart/form-data">
      <input type="text" name="year" placeholder="Enter desired year">
      <input type="file" name="workbook" accept=".xlsx">
      <input type="submit" value="Generate PDF">
    </form>
  </body>
</html>
