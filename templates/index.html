<!DOCTYPE html>
<html lang="en">
  <style>
    body {
      font-family: League Spartan, sans-serif;
      src: url('static/fonts/LeagueSpartan-Regular.ttf');
      background-color: #fcebe7;
      margin: 20px;
    }

    h2 {
      color: #f3623d;
      text-align: center;
    }

    form {
      margin-top: 20px;
    }

    input[type="text"],
    input[type="file"] {
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    input[type="submit"] {
      background-color: #f3623d;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background-color: #f3623d;
    }
  </style>

  <body>
    <img src="static/backgrounds/mh.webp" alt="Background Image" style="width: 100%; max-width: 300px;">
    <h2>Enter a year</h2>

    <form method="POST" action="/run" enctype="multipart/form-data">
      <input type="text" name="year" placeholder="Enter desired year">
      <input type="file" name="workbook" accept=".xlsx">
      <input type="submit" value="Generate PDF">
    </form>
  </body>
</html>
